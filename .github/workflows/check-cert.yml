name: 🔍 Check Certificate SHA1

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔍 Check upload_cert.der SHA1
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "upload_cert.der ka SHA1:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          keytool -printcert -file upload_cert.der | grep -E "SHA1|SHA256|Owner"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          echo ""
          echo "Current keystore ka SHA1:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          keytool -list -v \
            -keystore release.keystore \
            -alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            -storepass ${{ secrets.ANDROID_STORE_PASSWORD }} \
            | grep -E "SHA1|SHA256|Alias"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"