name: 🚀 Production Build — Signed APK + AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Android Production Build
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Install Expo CLI
        run: npm install -g @expo/cli

      - name: 📄 Create .env file
        run: |
          cat > .env << 'EOF'
          EXPO_PUBLIC_BASE_URL=https://production.alfennzo.com/api/v1
          EXPO_PUBLIC_FIREBASE_API_KEY=AIzaSyAGwdVq_euG9apZlhl1bXspqVQdyDyrb3I
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=partner-console-production.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_DATABASE_URL=https://partner-console-production-default-rtdb.asia-southeast1.firebasedatabase.app
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=partner-console-production
          EXPO_PUBLIC_FIREBASE_APP_ID=1:814221401570:web:2fdfbafd7fdedef80a6dbb
          EOF
          echo "✅ .env created"

      - name: 🔑 Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          echo "✅ Keystore decoded"
          echo "--- Keystore SHA1 ---"
          keytool -list -v \
            -keystore release.keystore \
            -storepass "${{ secrets.ANDROID_STORE_PASSWORD }}" \
            2>/dev/null | grep "SHA1"

      - name: 🏗️ Expo Prebuild
        run: npx expo prebuild --platform android --clean --no-install

      - name: 🔧 Patch build.gradle (minify off only)
        run: |
          python3 - <<'PYEOF'
          import re

          gradle_path = "android/app/build.gradle"
          with open(gradle_path, "r") as f:
              content = f.read()

          # Sirf minifyEnabled false karo — signing command line se hogi
          content = re.sub(
              r'(buildTypes\s*\{[^}]*?release\s*\{)',
              (
                  r'\1'
                  r'\n            minifyEnabled   false'
                  r'\n            shrinkResources false'
              ),
              content,
              count=1,
              flags=re.DOTALL
          )

          with open(gradle_path, "w") as f:
              f.write(content)

          print("✅ build.gradle patched")
          PYEOF

      - name: 🔨 Build Signed APK + AAB
        run: |
          cd android
          chmod +x gradlew
          # Signing directly command line se — build.gradle override hoga
          ./gradlew assembleRelease bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: ✅ Verify AAB SHA1
        run: |
          echo "--- AAB SHA1 verify ---"
          keytool -printcert -jarfile \
            android/app/build/outputs/bundle/release/app-release.aab \
            2>/dev/null | grep "SHA1"
          echo ""
          echo "Expected: C2:11:92:F4:3F:F4:C1:75:0C:60:14:E5:89:34:24:26:10:9C:8D:0B"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alfennzo-partner-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 1

      - name: 📤 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: alfennzo-partner-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 1

      - name: 📊 Build Summary
        run: |
          echo "### ✅ Signed Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -sh android/app/build/outputs/apk/release/app-release.apk 2>/dev/null | cut -f1 || echo "N/A")
          AAB_SIZE=$(du -sh android/app/build/outputs/bundle/release/app-release.aab 2>/dev/null | cut -f1 || echo "N/A")
          echo "| APK | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB | $AAB_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "✅ AAB signed — Play Store pe upload karo!" >> $GITHUB_STEP_SUMMARY