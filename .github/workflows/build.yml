name: 🚀 Production Build — APK + AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Android Production Build
    runs-on: ubuntu-latest

    steps:

      # ── 1. Code checkout ───────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── 2. Node setup ──────────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Java setup ──────────────────────────────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ─────────────────────────────────────────────────────
      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Dependencies ────────────────────────────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci

      # ── 6. Expo CLI ────────────────────────────────────────────────────────
      - name: 🔧 Install Expo CLI
        run: npm install -g @expo/cli

      # ── 7. Keystore decode ─────────────────────────────────────────────────
      # GitHub Secret: ANDROID_KEYSTORE_BASE64
      # Banane ka command apni machine pe:
      #   keytool -genkey -v -keystore release.keystore -alias alfennzo-key -keyalg RSA -keysize 2048 -validity 10000
      #   base64 -i release.keystore  (Mac/Linux)
      #   certutil -encode release.keystore tmp.b64 && findstr /v /c:- tmp.b64 > encoded.b64  (Windows)
      - name: 🔑 Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      # ── 8. Expo Prebuild — android folder generate hoga ───────────────────
      - name: 🏗️ Expo Prebuild
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_TOKEN:                        ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_BASE_URL:              ${{ secrets.EXPO_PUBLIC_BASE_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY:      ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:  ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID:   ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID:       ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}

      # ── 9. keystore.properties banao android/ folder mein ─────────────────
      - name: 📝 Create keystore.properties
        run: |
          cat > android/keystore.properties << EOF
          storeFile=../release.keystore
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # ── 10. build.gradle mein signing config inject karo ──────────────────
      - name: 🔧 Patch build.gradle (signing config inject)
        run: node patch-gradle.js

      # ── 11. Gradle cache (build fast hoga) ────────────────────────────────
      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 12. Production APK + AAB build ────────────────────────────────────
      - name: 🔨 Build APK + AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace
        env:
          EXPO_PUBLIC_BASE_URL:              ${{ secrets.EXPO_PUBLIC_BASE_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY:      ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:  ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID:   ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID:       ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}

      # ── 13. APK Upload ─────────────────────────────────────────────────────
      - name: 📤 Upload APK (direct install ke liye)
        uses: actions/upload-artifact@v4
        with:
          name: alfennzo-partner-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      # ── 14. AAB Upload ─────────────────────────────────────────────────────
      - name: 📤 Upload AAB (Play Store ke liye)
        uses: actions/upload-artifact@v4
        with:
          name: alfennzo-partner-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      # ── 15. Build summary ──────────────────────────────────────────────────
      - name: 📊 Build Summary
        run: |
          echo "### ✅ Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -sh android/app/build/outputs/apk/release/app-release.apk | cut -f1)
          AAB_SIZE=$(du -sh android/app/build/outputs/bundle/release/app-release.aab | cut -f1)
          echo "| APK  | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB  | $AAB_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts** tab se download karo 👆" >> $GITHUB_STEP_SUMMARY