name: 🚀 Production Build — APK + AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Android Production Build
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Install Expo CLI
        run: npm install -g @expo/cli

      # ─────────────────────────────────────────────────────────────────────
      # .env file banao — Metro bundler yahi file padhta hai
      # shell env vars nahi padhta, isliye ye step zaroori hai
      # ─────────────────────────────────────────────────────────────────────
      - name: 📄 Create .env file
        run: |
          cat > .env << EOF
          EXPO_PUBLIC_BASE_URL=${{ secrets.EXPO_PUBLIC_BASE_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_DATABASE_URL=${{ secrets.EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EOF

          echo "--- Verifying secrets are not empty ---"
          while IFS='=' read -r key value; do
            value=$(echo "$value" | xargs)
            if [ -z "$value" ]; then
              echo "❌ $key = EMPTY — GitHub Secret missing!"
            else
              echo "✅ $key = SET (${#value} chars)"
            fi
          done < .env

      - name: 🔑 Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          echo "✅ Keystore decoded ($(du -sh release.keystore | cut -f1))"

      - name: 🏗️ Expo Prebuild
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📝 Create keystore.properties
        run: |
          cat > android/keystore.properties << EOF
          storeFile=../release.keystore
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          echo "✅ keystore.properties created"

      - name: 🔧 Patch build.gradle
        run: |
          GRADLE_FILE="android/app/build.gradle"

          if grep -q "signingConfigs" "$GRADLE_FILE"; then
            echo "✅ Already patched — skipping"
            exit 0
          fi

          python3 - <<'PYEOF'
          import re

          gradle_path = "android/app/build.gradle"
          with open(gradle_path, "r") as f:
              content = f.read()

          signing_block = """
              signingConfigs {
                  release {
                      def props = new Properties()
                      def propsFile = rootProject.file("keystore.properties")
                      if (propsFile.exists()) { props.load(new FileInputStream(propsFile)) }
                      storeFile     file(props["storeFile"]     ?: "../release.keystore")
                      keyAlias      props["keyAlias"]     ?: ""
                      storePassword props["storePassword"] ?: ""
                      keyPassword   props["keyPassword"]   ?: ""
                  }
              }
          """

          content = re.sub(
              r'(android\s*\{)',
              r'\1' + signing_block,
              content,
              count=1
          )

          content = re.sub(
              r'(buildTypes\s*\{[^}]*?release\s*\{)',
              (
                  r'\1'
                  r'\n            signingConfig   signingConfigs.release'
                  r'\n            minifyEnabled   false'
                  r'\n            shrinkResources false'
              ),
              content,
              count=1,
              flags=re.DOTALL
          )

          with open(gradle_path, "w") as f:
              f.write(content)

          print("✅ build.gradle patched")
          PYEOF

      - name: 📋 Write ProGuard rules
        run: |
          cat > android/app/proguard-rules.pro << 'EOF'
          -keep class com.facebook.react.**            { *; }
          -keep class com.facebook.hermes.**           { *; }
          -keep class com.facebook.jni.**              { *; }
          -keep class expo.modules.**                  { *; }
          -keep class com.google.firebase.**           { *; }
          -keep class com.google.android.gms.**        { *; }
          -keep class com.swmansion.gesturehandler.**  { *; }
          -keep class com.swmansion.reanimated.**      { *; }
          -keep class com.th3rdwave.safeareacontext.** { *; }
          -keep class com.swmansion.rnscreens.**       { *; }
          -keep class expo.modules.notifications.**    { *; }
          -keepclassmembers class * {
              @android.webkit.JavascriptInterface <methods>;
          }
          -keep class com.alfennzo.alfennzo_partner.BuildConfig { *; }
          EOF
          echo "✅ ProGuard rules written"

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 🔨 Build APK + AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alfennzo-partner-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: 📤 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: alfennzo-partner-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: 📊 Build Summary
        run: |
          echo "### ✅ Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -sh android/app/build/outputs/apk/release/app-release.apk 2>/dev/null | cut -f1 || echo "N/A")
          AAB_SIZE=$(du -sh android/app/build/outputs/bundle/release/app-release.aab 2>/dev/null | cut -f1 || echo "N/A")
          echo "| APK  | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB  | $AAB_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts tab se download karo ⬆️" >> $GITHUB_STEP_SUMMARY