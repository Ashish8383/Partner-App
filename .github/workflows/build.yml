name: 🚀 Production Build — Signed APK + AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Android Production Build
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Install Expo CLI
        run: npm install -g @expo/cli

      - name: 📄 Create .env file
        run: |
          cat > .env << 'EOF'
          EXPO_PUBLIC_BASE_URL=https://production.alfennzo.com/api/v1
          EXPO_PUBLIC_FIREBASE_API_KEY=AIzaSyAGwdVq_euG9apZlhl1bXspqVQdyDyrb3I
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=partner-console-production.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_DATABASE_URL=https://partner-console-production-default-rtdb.asia-southeast1.firebasedatabase.app
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=partner-console-production
          EXPO_PUBLIC_FIREBASE_APP_ID=1:814221401570:web:2fdfbafd7fdedef80a6dbb
          EOF
          echo "✅ .env created"

      # ── Keystore decode ────────────────────────────────────────────────────
      - name: 🔑 Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          echo "✅ Keystore ready ($(du -sh release.keystore | cut -f1))"

      - name: 🏗️ Expo Prebuild
        run: npx expo prebuild --platform android --clean --no-install

      # ── keystore.properties ────────────────────────────────────────────────
      - name: 📝 Create keystore.properties
        run: |
          cat > android/keystore.properties << EOF
          storeFile=../release.keystore
          keyAlias=alfennzo-key
          storePassword=Alfennzo@2024
          keyPassword=Alfennzo@2024
          EOF
          echo "✅ keystore.properties created"

      # ── build.gradle patch — signing + minify off ──────────────────────────
      - name: 🔧 Patch build.gradle
        run: |
          python3 - <<'PYEOF'
          import re

          gradle_path = "android/app/build.gradle"
          with open(gradle_path, "r") as f:
              content = f.read()

          if "signingConfigs" in content:
              print("✅ Already patched")
              exit()

          signing_block = """
              signingConfigs {
                  release {
                      def props = new Properties()
                      def propsFile = rootProject.file("keystore.properties")
                      if (propsFile.exists()) { props.load(new FileInputStream(propsFile)) }
                      storeFile     file(props["storeFile"]     ?: "../release.keystore")
                      keyAlias      props["keyAlias"]     ?: ""
                      storePassword props["storePassword"] ?: ""
                      keyPassword   props["keyPassword"]   ?: ""
                  }
              }
          """

          content = re.sub(
              r'(android\s*\{)',
              r'\1' + signing_block,
              content,
              count=1
          )

          content = re.sub(
              r'(buildTypes\s*\{[^}]*?release\s*\{)',
              (
                  r'\1'
                  r'\n            signingConfig   signingConfigs.release'
                  r'\n            minifyEnabled   false'
                  r'\n            shrinkResources false'
              ),
              content,
              count=1,
              flags=re.DOTALL
          )

          with open(gradle_path, "w") as f:
              f.write(content)

          print("✅ build.gradle patched")
          PYEOF

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 🔨 Build Signed APK + AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alfennzo-partner-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: 📤 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: alfennzo-partner-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: 📊 Build Summary
        run: |
          echo "### ✅ Signed Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -sh android/app/build/outputs/apk/release/app-release.apk 2>/dev/null | cut -f1 || echo "N/A")
          AAB_SIZE=$(du -sh android/app/build/outputs/bundle/release/app-release.aab 2>/dev/null | cut -f1 || echo "N/A")
          echo "| APK (Testing) | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| AAB (Play Store) | $AAB_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ AAB signed hai — Play Store pe upload karo!" >> $GITHUB_STEP_SUMMARY