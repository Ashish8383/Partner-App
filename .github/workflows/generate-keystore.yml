name: 🔑 Generate Keystore (Sirf Ek Baar)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔑 Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias alfennzo-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass Alfennzo@2024 \
            -keypass Alfennzo@2024 \
            -dname "CN=Alfennzo, OU=IT, O=Alfennzo, L=Delhi, S=Delhi, C=IN"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "ANDROID_KEYSTORE_BASE64 ki value (copy karke secret mein daalo):"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          base64 -w 0 release.keystore
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "ANDROID_KEY_ALIAS      = alfennzo-key"
          echo "ANDROID_STORE_PASSWORD = Alfennzo@2024"
          echo "ANDROID_KEY_PASSWORD   = Alfennzo@2024"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"